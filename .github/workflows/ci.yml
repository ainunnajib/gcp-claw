name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (lockfiles)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock -r requirements-dev.lock
      - name: Lint
        run: ruff check gcpclaw tests
      - name: Type check
        run: mypy gcpclaw
      - name: Unit tests
        run: pytest -v
      - name: Security scan (bandit)
        run: bandit -q -r gcpclaw -c bandit.yaml
      - name: Dependency audit
        run: pip-audit -r requirements.lock --no-deps --disable-pip
      - name: Generate SBOM
        run: cyclonedx-py requirements requirements.lock --of JSON -o sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
      - name: Sign SBOM artifact (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3
      - name: Cosign sign-blob
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: cosign sign-blob --yes --bundle sbom.bundle sbom.cdx.json
      - name: Attest build provenance
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "sbom.cdx.json"
